name: Set Up Cumulus
description: 'Install CumulusCI and sf cli'
inputs:
  cumulusci-version:
    description: 'version of CumulusCI to install'
    required: false
  sf-version:
    description: 'version of SF CLI to install'
    required: false
runs:
    using: "composite"
    steps:
      - name: Set Installable Versions
        id: versions
        # Note: we do not pin an action tag here. This is deliberate,
        # to allow us flexibility in pinning specific package versions.
        uses: MyClubHub/cumulusci-default-package-versions@main
        with:
          cumulusci-version: '${{ inputs.cumulusci-version }}'
          sf-version: '${{ inputs.sf-version }}'
      - name: Store Versions
        run: |
          echo '${{ steps.versions.outputs.sf-version }}' > actions-sf-version.txt
          echo '${{ steps.versions.outputs.cumulusci-version }}' > actions-cci-version.txt
        shell: bash
      - name: Set Up Node 
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: actions-sf-version.txt
      
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.51.0

      - name: Install dependencies
        run: npm i
        shell: bash

      - name: Install Playwright 1.51.0
        run: npm install playwright@1.51.0
        shell: bash

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          npx playwright@1.51.0 install chromium
          npx playwright@1.51.0 install-deps chromium
        shell: bash

      - name: Install Playwright system deps only (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright@1.51.0 install-deps chromium
        shell: bash
      
      - name: Install @salesforce/cli
        run: |
          npm install -g '@salesforce/cli@${{ steps.versions.outputs.sf-version }}'
        shell: bash
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          # cache: pip
          # cache-dependency-path: actions-cci-version.txt
      - name: Install CumulusCI
        run: |
          pip install git+https://github.com/MyClubHub/CumulusCI.git@syncSourceRepo
        shell: bash
      - name: Install SFDMU plugin
        run: |
          sf plugins install sfdmu
        shell: bash
      - name: Pin setuptools to 80.10.1
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y setuptools
          pip install setuptools==80.10.1 wheel
        shell: bash
